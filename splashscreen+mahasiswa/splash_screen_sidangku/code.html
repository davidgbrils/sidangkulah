<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SidangKu - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#799dd6",
                        "surface-dim": "#cbdbf5",
                        "surface": "#f8f9ff",
                        "secondary-fixed": "#dbe3ea",
                        "surface-tint": "#3a5f94",
                        "primary-container": "#003366",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001b3c",
                        "on-tertiary-container": "#c99100",
                        "error-container": "#ffdad6",
                        "secondary-container": "#dbe3ea",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#43474f",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#271900",
                        "on-surface": "#0b1c30",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d1",
                        "inverse-on-surface": "#eaf1ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdea6",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-fixed": "#151d22",
                        "inverse-surface": "#213145",
                        "inverse-primary": "#a7c8ff",
                        "on-secondary-container": "#5d656b",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed": "#d5e3ff",
                        "secondary-fixed-dim": "#bfc8ce",
                        "surface-container": "#e5eeff",
                        "on-primary": "#ffffff",
                        "background": "#f8f9ff",
                        "secondary": "#575f65",
                        "tertiary": "#2a1b00",
                        "on-tertiary-fixed-variant": "#5e4200",
                        "outline": "#737780",
                        "surface-bright": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-secondary-fixed-variant": "#40484d",
                        "tertiary-container": "#452f00",
                        "primary-fixed-dim": "#a7c8ff",
                        "primary": "#001e40",
                        "tertiary-fixed-dim": "#fbbc34",
                        "on-background": "#0b1c30",
                        "surface-variant": "#d3e4fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "md": "16px",
                        "xs": "4px",
                        "base": "8px",
                        "gutter": "16px",
                        "xl": "32px",
                        "margin-desktop": "32px",
                        "lg": "24px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Public Sans"],
                        "display-lg": ["Public Sans"],
                        "title-lg": ["Public Sans"],
                        "title-md": ["Public Sans"],
                        "label-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "headline-lg": ["Public Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "700"}],
                        "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "600"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #003366; /* Matching Brand Deep Blue */
        }
        .progress-bar-container {
            width: 140px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            width: 40%; /* Static representation for UI design */
            height: 100%;
            background-color: #ffffff;
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-center overflow-hidden font-body-md text-on-surface">
<!-- Background Pattern/Layering -->
<div class="absolute inset-0 z-0 opacity-10">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-white rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-white rounded-full blur-3xl"></div>
</div>
<!-- Main Splash Content -->
<main class="relative z-10 flex flex-col items-center justify-center text-center px-margin-mobile">
<!-- Center Logo: Graduation Cap -->
<div class="mb-base flex items-center justify-center w-24 h-24 rounded-full bg-white/5 backdrop-blur-sm border border-white/10 shadow-xl mb-lg">
<span class="material-symbols-outlined text-[64px] text-white" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<!-- Identity -->
<div class="flex flex-col gap-xs">
<h1 class="font-display-lg text-headline-lg md:text-display-lg text-white tracking-tight">SidangKu</h1>
<p class="font-body-md text-label-lg text-on-primary-container tracking-wide">
                Sistem Manajemen Sidang Skripsi
            </p>
</div>
</main>
<!-- Footer: Loading Bar & Institutional Mark -->
<footer class="absolute bottom-16 flex flex-col items-center gap-lg z-10">
<!-- Progress Bar -->
<div class="progress-bar-container">
<div class="progress-bar-fill"></div>
</div>
<!-- Institutional Text -->
<div class="flex flex-col items-center opacity-60">
<span class="font-label-md text-white/70 uppercase tracking-[0.2em]">ITPLN Digital Ecosystem</span>
</div>
</footer>
<!-- Decorative Bottom Gradient for Depth -->
<div class="absolute bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-primary/40 to-transparent pointer-events-none"></div>
</body></html>
