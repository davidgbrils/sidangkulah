<body class="flex flex-col min-h-screen">
<!-- Top Branding Section with Geometric Pattern -->
<header class="relative w-full h-56 flex flex-col items-center justify-center overflow-hidden bg-primary overflow-hidden">
<div class="absolute inset-0 academic-pattern" data-alt="Subtle geometric pattern of cubes and academic lines on a deep navy background with soft ambient lighting"></div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-xl bg-white shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="school">school</span>
</div>
<h1 class="text-white font-headline-md text-headline-md tracking-tight">SidangKu</h1>
</div>
</header>
<!-- Main Login Content -->
<main class="flex-grow flex flex-col px-margin-mobile -mt-8 relative z-20">
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-lg flex flex-col gap-lg">
<div class="text-center">
<h2 class="text-on-surface font-title-lg text-title-lg">Selamat Datang</h2>
<p class="text-on-secondary-container font-body-md text-body-md mt-xs">Masuk ke akun Anda</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email/NIM Input -->
<div class="flex flex-col gap-xs">
<label class="text-on-surface-variant font-label-lg text-label-lg px-1" for="username">Email atau NIM</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-on-surface" id="username" placeholder="Contoh: 202011001" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="text-on-surface-variant font-label-lg text-label-lg px-1" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 flex items-center justify-center text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-on-primary-fixed-variant font-label-md text-label-md hover:underline" href="#">Lupa password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-white py-3.5 rounded-lg font-title-md text-title-md shadow-md active:scale-95 transition-transform duration-150 mt-base" type="submit">
                    Masuk
                </button>
</form>
<!-- Secondary Actions (Optional/Design Enhancement) -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-outline font-label-md text-label-md">Atau</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full border border-outline-variant text-on-surface py-3 rounded-lg font-label-lg text-label-lg flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="qr_code_scanner">qr_code_scanner</span>
                Login dengan QR Code
            </button>
</div>
<!-- Helping Text -->
<div class="mt-xl text-center">
<p class="text-on-surface-variant font-body-md text-body-md">
                Belum memiliki akun? 
                <a class="text-on-primary-fixed-variant font-title-md text-title-md" href="#">Hubungi Admin Prodi</a>
</p>
</div>
</main>
<!-- Footer Area -->
<footer class="py-lg px-margin-mobile text-center">
<div class="flex flex-col items-center gap-base">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-sm bg-primary flex items-center justify-center p-0.5">
<span class="material-symbols-outlined text-white text-xs" data-icon="hub" style="font-variation-settings: 'FILL' 1;">hub</span>
</div>
<p class="text-on-secondary-fixed-variant font-label-md text-label-md">Part of ITPLN Digital Ecosystem</p>
</div>
<p class="text-outline font-label-md text-label-md opacity-75">© 2024 Institut Teknologi PLN. All rights reserved.</p>
</div>
</footer>
<!-- Decorative Bottom Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-on-primary-container to-primary"></div>
