name: sidangkufix
description: "SidangKu - Sistem Manajemen Sidang Skripsi ITPLN"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Local Storage
  shared_preferences: ^2.5.3

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # File Handling
  file_picker: ^9.2.1
  open_file: ^3.5.10
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1

  # PDF & Sharing
  printing: ^5.14.2
  share_plus: ^10.1.4
  pdf: ^3.11.2
  signature: ^5.4.0

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


