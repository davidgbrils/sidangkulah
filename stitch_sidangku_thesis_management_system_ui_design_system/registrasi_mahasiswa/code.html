<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - SidangKu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#a64c00",
                        "on-surface": "#191c21",
                        "inverse-on-surface": "#eff0f9",
                        "surface-bright": "#f9f9ff",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e7e8f0",
                        "on-tertiary-fixed": "#321200",
                        "secondary-container": "#51b2fe",
                        "on-primary-fixed-variant": "#00468c",
                        "on-surface-variant": "#424752",
                        "on-secondary-fixed-variant": "#004a75",
                        "surface": "#f9f9ff",
                        "primary-fixed": "#d6e3ff",
                        "on-primary-fixed": "#001b3d",
                        "primary-container": "#1565c0",
                        "secondary-fixed": "#cee5ff",
                        "on-secondary-container": "#00436a",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2e3037",
                        "on-primary": "#ffffff",
                        "background": "#f9f9ff",
                        "tertiary-fixed-dim": "#ffb68c",
                        "secondary-fixed-dim": "#96ccff",
                        "surface-container-highest": "#e1e2ea",
                        "surface-dim": "#d8dae2",
                        "surface-container-low": "#f2f3fb",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#001d32",
                        "tertiary": "#813900",
                        "on-tertiary-container": "#ffdece",
                        "tertiary-fixed": "#ffdbc9",
                        "on-error": "#ffffff",
                        "on-background": "#191c21",
                        "secondary": "#00639a",
                        "outline-variant": "#c2c6d4",
                        "on-tertiary-fixed-variant": "#753400",
                        "surface-container": "#ecedf6",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary": "#004d99",
                        "outline": "#727783",
                        "on-primary-container": "#dae5ff",
                        "surface-variant": "#e1e2ea",
                        "surface-tint": "#005db7",
                        "inverse-primary": "#a9c7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "bottom-nav-height": "80px",
                        "container-padding": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "h2": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h2": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "h1": ["22px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col antialiased">
<!-- Top Navigation AppBar - Using specific JSON settings for transactional flow: Hide nav structure -->
<header class="bg-surface-container-lowest dark:bg-inverse-surface border-b border-outline-variant flex items-center justify-between px-gutter h-16 w-full z-50 fixed top-0">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-variant/20 dark:hover:bg-on-surface/10 p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h1 text-h1 font-bold text-primary dark:text-primary-fixed-dim tracking-tight">SidangKu</h1>
</div>
<div class="flex items-center">
<!-- Top App bar trailing icon hidden for register screen -->
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-16 flex flex-col relative w-full overflow-hidden">
<!-- Header Background Gradient (simulating the 'login screen' aesthetic requested) -->
<div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-primary to-secondary -z-10"></div>
<div class="absolute top-0 left-0 w-full h-64 bg-[url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=2000&amp;q=80')] bg-cover bg-center opacity-10 mix-blend-overlay -z-10" data-alt="A modern university campus building facade featuring clean architectural lines, large glass windows reflecting a bright blue sky, and subtle academic elements. The scene is illuminated by soft, natural daylight conveying a professional, aspirational mood. The overall aesthetic perfectly matches a pristine, high-end corporate or academic digital environment."></div>
<!-- Content Container -->
<div class="w-full max-w-md mx-auto px-container-padding pt-12 pb-24 z-10">
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_16px_rgba(0,0,0,0.08)] overflow-hidden border border-outline-variant/30 flex flex-col">
<!-- Card Header with Accent -->
<div class="h-2 w-full bg-secondary-container"></div>
<div class="p-6 md:p-8 flex flex-col gap-6">
<!-- Titles -->
<div class="text-center">
<h2 class="font-h1 text-h1 text-on-surface mb-2">Buat Akun Baru</h2>
<p class="font-body text-body text-on-surface-variant">Isi data diri sesuai data akademik kampus</p>
</div>
<!-- Informational Caption -->
<div class="bg-surface-container-low p-3 rounded-lg border border-surface-variant flex items-start gap-3">
<span class="material-symbols-outlined text-outline mt-0.5" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-label-sm text-label-sm text-on-surface-variant italic leading-relaxed">
                            Akun hanya bisa dibuat dengan NIM terdaftar. Akun Dosen dibuat oleh Admin.
                        </p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5">
<!-- Nama Lengkap Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="fullName">Nama Lengkap</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="fullName" placeholder="Masukkan nama lengkap" type="text"/>
</div>
</div>
<!-- NIM Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="nim">NIM</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="badge">badge</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="nim" placeholder="Masukkan Nomor Induk Mahasiswa" type="number"/>
</div>
</div>
<!-- Email Kampus Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email Kampus</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="email" placeholder="contoh@itpln.ac.id" type="email"/>
</div>
</div>
<!-- Nomor Telepon Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="phone">Nomor Telepon</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="call">call</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="phone" placeholder="08xxxxxxxxxx" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-12 pl-10 pr-10 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="password" placeholder="Minimal 8 karakter" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Password Strength Bar -->
<div class="flex items-center gap-2 mt-1">
<div class="h-1 flex-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-error w-1/4"></div>
</div>
<span class="font-label-sm text-label-sm text-error" style="font-size: 10px;">Lemah</span>
</div>
</div>
<!-- Konfirmasi Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="confirmPassword">Konfirmasi Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock_reset">lock_reset</span>
<input class="w-full h-12 pl-10 pr-10 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body text-body text-on-surface transition-all duration-200 outline-none" id="confirmPassword" placeholder="Ulangi password" type="password"/>
</div>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary bg-surface border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" type="checkbox"/>
</div>
<label class="font-body text-body text-on-surface-variant text-sm" for="terms">
                                Saya menyetujui <a class="text-primary font-medium hover:underline" href="#">Syarat &amp; Ketentuan</a> serta <a class="text-primary font-medium hover:underline" href="#">Kebijakan Privasi</a> yang berlaku di Institut Teknologi PLN.
                            </label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 mt-4 bg-primary text-on-primary rounded-lg font-h2 text-h2 shadow-[0_2px_8px_rgba(0,0,0,0.06)] hover:bg-on-primary-fixed-variant transition-colors duration-200 flex items-center justify-center gap-2" type="button">
<span>Buat Akun</span>
<span class="material-symbols-outlined" data-icon="arrow_forward" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="bg-surface-container-lowest border-t border-outline-variant/30 p-4 text-center">
<a class="font-body text-body text-on-surface-variant hover:text-primary transition-colors" href="#">
                        Sudah punya akun? <span class="font-medium text-primary">Masuk</span>
</a>
</div>
</div>
</div>
</main>
<!-- Bottom Nav & Drawer intentionally omitted for transactional (registration) flow as per rules -->
</body></html>
